Date: 02/21/2026 06:30 | Provider: Dr. H. Nakamura, Gastroenterology
Reason for Consult: URGENT — Upper GI hemorrhage

CLINICAL CONTEXT:
Nursing reported melanotic stool overnight. Patient had one episode of coffee-ground emesis this AM. Hemodynamically: HR 108, BP 110/68 (baseline 140s). AM labs show Hgb drop from 11.2 (admission) to 7.4. Cr 1.8 (rising from baseline 1.5).

- Esophagus: Normal. No varices.
- Stomach: Single gastric ulcer located on the lesser curvature of the gastric body, approximately 3 cm in diameter. Forrest Classification IIa — visible vessel, not actively bleeding at time of endoscopy. Two endoclips placed successfully with primary hemostasis achieved.
- Duodenum: Normal.
- Biopsies: Taken from ulcer margins for H. pylori testing. Results pending.

Likely multifactorial:
- Therapeutic anticoagulation (apixaban)
- Systemic corticosteroids (methylprednisolone → prednisone)
- Possible NSAID use (ibuprofen on home medication list — unclear if taken recently prior to admission)

RECOMMENDATIONS:
1. IV pantoprazole 80 mg bolus, then 8 mg/hr continuous infusion
2. NPO until hemodynamically stable x 24 hours
3. HOLD anticoagulation — recommend minimum 72 hours post-hemostasis before considering restart. Discuss timing with cardiology given afib and stroke risk.
4. Strongly recommend against restarting any NSAIDs. Patient has multiple risk factors for recurrent GI bleeding (anticoagulation, steroids, prior ulcer now documented, CKD).
5. Continue prednisone — cannot abruptly discontinue given adrenal suppression risk after 3 days IV steroids. PPI coverage is essential.

PROCEDURE: Selective angiographic embolization of left gastric artery

INDICATION: Recurrent upper GI hemorrhage from gastric ulcer after failed endoscopic hemostasis

TECHNIQUE:
Right common femoral artery access. 5F sheath placed. Celiac arteriography performed demonstrating active extravasation from a branch of the left gastric artery corresponding to the known gastric ulcer location. Selective catheterization of the left gastric artery performed with microcatheter. Embolization with gelatin sponge (Gelfoam) pledgets until cessation of flow to the bleeding branch confirmed on post-embolization angiography. Adequate collateral flow to the gastric fundus confirmed. Sheath removed, hemostasis achieved with manual compression.

FINDINGS: Active extravasation from left gastric artery branch — successfully embolized.

COMPLICATIONS: None.

1. Bed rest x 6 hours, right groin site check Q15min x 1 hour, then Q1H x 4 hours

3. NPO x 12 hours, then advance diet as tolerated
4. Hold anticoagulation minimum 5 days post-procedure (restart no sooner than 02/27/2026)
5. Groin site: monitor for hematoma, distal pulses
6. Continue IV pantoprazole drip

Transfer to MICU for hemodynamic monitoring.

function EHRApp() {
  const [selectedNote, setSelectedNote] = useState("d4");
  const [notes, setNotes] = useState(NOTES_DATA);
  const [editMode, setEditMode] = useState(false);
  const [editContent, setEditContent] = useState("");
  const [comments, setComments] = useState({});
  const [newComment, setNewComment] = useState("");
  const [showComments, setShowComments] = useState(false);
  const [searchTerm, setSearchTerm] = useState("");
  const [filterDept, setFilterDept] = useState("All");
  const printRef = useRef(null);

  const currentNote = notes.find((n) => n.id === selectedNote);

  const handleEdit = useCallback(() => {
    if (currentNote) {
      setEditContent(currentNote.content);
      setEditMode(true);
    }
  }, [currentNote]);

  const handleSave = useCallback(() => {
    setNotes((prev) =>
      prev.map((n) =>
        n.id === selectedNote ? { ...n, content: editContent } : n
      )
    );
    setEditMode(false);
  }, [selectedNote, editContent]);

  const handleCancel = () => {
    setEditMode(false);
    setEditContent("");
  };

  const handleAddComment = useCallback(() => {
    if (!newComment.trim()) return;
    const now = new Date().toLocaleString();
    setComments((prev) => ({
      ...prev,
      [selectedNote]: [
        ...(prev[selectedNote] || []),
        { text: newComment, time: now, author: "Reviewer" },
      ],
    }));
    setNewComment("");
  }, [newComment, selectedNote]);

  const handleDeleteComment = useCallback(
    (idx) => {
      setComments((prev) => ({
        ...prev,
        [selectedNote]: prev[selectedNote].filter((_, i) => i !== idx),
      }));
    },
    [selectedNote]
  );

  const handleDownloadPDF = useCallback(() => {
    if (!currentNote) return;
    const w = window.open("", "_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>${currentNote.title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap');
  * { margin:0; box-sizing:border-box; }
  body { font-family:'Source Sans 3',sans-serif; padding:40px 50px; color:#2C3E50; font-size:11pt; line-height:1.5; }
  .header { border-bottom:3px solid #1B2A4A; padding-bottom:12px; margin-bottom:20px; }
  .header h1 { font-size:16pt; color:#1B2A4A; }
  .header .meta { font-size:9pt; color:#7F8C8D; margin-top:4px; }
  .patient-bar { background:#E8F0FE; border:1px solid #B0C4DE; border-radius:4px; padding:8px 14px; font-size:9pt; margin-bottom:20px; display:flex; gap:24px; flex-wrap:wrap; }
  .patient-bar span { white-space:nowrap; }
  .patient-bar b { color:#1B2A4A; }
  pre { font-family:'IBM Plex Mono',monospace; font-size:10pt; white-space:pre-wrap; line-height:1.6; }
  .footer { margin-top:30px; border-top:1px solid #D5D8DC; padding-top:10px; font-size:8pt; color:#7F8C8D; }
  @media print { body { padding:20px 30px; } }
</style></head><body>
<div class="header"><h1>${currentNote.title}</h1><div class="meta">${currentNote.author} | ${currentNote.dept} | ${currentNote.date} ${currentNote.time}</div></div>
<div class="patient-bar">
  <span><b>Patient:</b> ${PATIENT.name}</span><span><b>MRN:</b> ${PATIENT.mrn}</span>
  <span><b>DOB:</b> ${PATIENT.dob}</span><span><b>Allergies:</b> ${PATIENT.allergies}</span>
</div>
<pre>${currentNote.content.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>
<div class="footer">Printed from EHR Clinical Review System | ${new Date().toLocaleString()}</div>
<scr" + "ipt>window.onload=function(){window.print();}</scr" + "ipt></body></html>`);
    w.document.close();
  }, [currentNote]);

  // Group notes by day
  const days = [...new Set(notes.map((n) => n.day))];
  const allDepts = ["All", ...new Set(notes.map((n) => n.dept))];

  const filteredNotes = notes.filter((n) => {
    const matchSearch =
      !searchTerm ||
      n.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
      n.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
      n.author.toLowerCase().includes(searchTerm.toLowerCase());
    const matchDept = filterDept === "All" || n.dept === filterDept;
    return matchSearch && matchDept;
  });

  const noteComments = comments[selectedNote] || [];

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif", background: theme.bg, overflow: "hidden" }}>
      {/* ── Sidebar ── */}
      <div style={{ width: 300, minWidth: 300, background: theme.sidebar, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Patient Banner */}
        <div style={{ padding: "16px 16px 12px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ color: "#FFF", fontWeight: 700, fontSize: 15, letterSpacing: 0.3 }}>{PATIENT.name}</div>
          <div style={{ display: "flex", gap: 12, marginTop: 6, flexWrap: "wrap" }}>
            {[`MRN: ${PATIENT.mrn}`, PATIENT.age, `DOB: ${PATIENT.dob}`].map((t, i) => (

            <span style={{ background: "#2C6FAA", color: "#FFF", fontSize: 10, padding: "2px 8px", borderRadius: 3, fontWeight: 600 }}>
              {PATIENT.code}
            </span>
          </div>
        </div>

        {/* Search */}
        <div style={{ padding: "10px 12px 6px" }}>
          <input
            value={searchTerm}
            onChange={(e) => setSearchTerm(e.target.value)}
            placeholder="Search notes..."
            style={{ width: "100%", padding: "7px 10px", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 4, color: "#FFF", fontSize: 12, outline: "none" }}
          />
          <select
            value={filterDept}
            onChange={(e) => setFilterDept(e.target.value)}
            style={{ width: "100%", marginTop: 6, padding: "5px 8px", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 4, color: "#AAB", fontSize: 11, outline: "none" }}
          >
            {allDepts.map((d) => <option key={d} value={d} style={{ background: "#1B2A4A" }}>{d}</option>)}
          </select>
        </div>

        {/* Note List */}
        <div style={{ flex: 1, overflowY: "auto", padding: "6px 0" }}>
          {days.map((day) => {
            const dayNotes = filteredNotes.filter((n) => n.day === day);
            if (dayNotes.length === 0) return null;
            return (
              <div key={day}>
                <div style={{ padding: "8px 16px 4px", color: "#6B8299", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>
                  {day}
                </div>
                {dayNotes.map((n) => {
                  const isActive = n.id === selectedNote;
                  const hasComments = (comments[n.id] || []).length > 0;
                  return (
                    <div
                      key={n.id}
                      onClick={() => { setSelectedNote(n.id); setEditMode(false); }}
                      style={{
                        padding: "8px 16px",
                        cursor: "pointer",
                        background: isActive ? theme.sidebarActive : "transparent",
                        borderLeft: isActive ? "3px solid #4FC3F7" : "3px solid transparent",
                        transition: "all 0.15s",
                      }}
                      onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = theme.sidebarHover; }}
                      onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = "transparent"; }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 14 }}>{n.icon}</span>
                        <span style={{ color: "#FFF", fontSize: 12, fontWeight: isActive ? 700 : 400, lineHeight: 1.3, flex: 1 }}>
                          {n.title}
                        </span>
                        {hasComments && <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#F39C12", flexShrink: 0 }} />}
                      </div>
                      <div style={{ display: "flex", gap: 8, marginTop: 3, marginLeft: 20 }}>
                        <span style={{ color: deptColors[n.dept] || "#8899AA", fontSize: 10, fontWeight: 600 }}>{n.dept}</span>
                        <span style={{ color: "#6B8299", fontSize: 10 }}>{n.time}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* Stats */}
        <div style={{ padding: "10px 16px", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", justifyContent: "space-between" }}>
          <span style={{ color: "#6B8299", fontSize: 10 }}>{notes.length} notes</span>
          <span style={{ color: "#6B8299", fontSize: 10 }}>
            {Object.values(comments).reduce((a, c) => a + c.length, 0)} comments
          </span>
        </div>
      </div>

      {/* ── Main Content ── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Top Bar */}
        <div style={{ padding: "10px 24px", background: "#FFF", borderBottom: `1px solid ${theme.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            <span style={{ background: theme.primaryLight, color: theme.primary, padding: "3px 10px", borderRadius: 4, fontSize: 11, fontWeight: 600 }}>
              {PATIENT.room}
            </span>
            <span style={{ fontSize: 12, color: theme.textLight }}>
              Admit: {PATIENT.admitDate}
            </span>
            <span style={{ fontSize: 12, color: theme.textLight }}>
              Attending: {PATIENT.attending}
            </span>
            <span style={{ fontSize: 12, color: theme.textLight }}>
              Wt: {PATIENT.weight} | BMI: {PATIENT.bmi} | Baseline Cr: {PATIENT.baselineCr}
            </span>
          </div>
          <div style={{ display: "flex", gap: 8 }}>

              onClick={() => setShowComments(!showComments)}
              style={{
                padding: "6px 14px", borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer", border: "1px solid #D5D8DC",

                          {currentNote.dept}
                        </span>
                        <span style={{ fontSize: 12, color: theme.textLight }}>{currentNote.author}</span>
                        <span style={{ fontSize: 12, color: theme.textLight }}>{currentNote.date} {currentNote.time}</span>
                        <span style={{ fontSize: 11, color: theme.textLight, background: theme.bg, padding: "1px 8px", borderRadius: 3 }}>{currentNote.type}</span>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                      {!editMode ? (
                        <>
                          <button onClick={handleEdit} style={{ padding: "6px 14px", background: theme.primary, color: "#FFF", border: "none", borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            ✏️ Edit
                          </button>
                          <button onClick={handleDownloadPDF} style={{ padding: "6px 14px", background: "#FFF", color: theme.text, border: `1px solid ${theme.border}`, borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            📄 PDF
                          </button>
                        </>
                      ) : (
                        <>
                          <button onClick={handleSave} style={{ padding: "6px 14px", background: theme.success, color: "#FFF", border: "none", borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            💾 Save
                          </button>
                          <button onClick={handleCancel} style={{ padding: "6px 14px", background: "#FFF", color: theme.danger, border: `1px solid ${theme.danger}`, borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            Cancel
                          </button>
                        </>
                      )}
                    </div>
                  </div>
                </div>

                {/* Note Content */}
                <div style={{ background: "#FFF", border: `1px solid ${theme.border}`, borderRadius: 6, overflow: "hidden" }}>
                  {editMode ? (
                    <textarea
                      value={editContent}
                      onChange={(e) => setEditContent(e.target.value)}
                      style={{
                        width: "100%", minHeight: 600, padding: 20, border: "none", outline: "none", resize: "vertical",
                        fontFamily: "'IBM Plex Mono', 'Consolas', monospace", fontSize: 12.5, lineHeight: 1.7, color: theme.text,
                        background: "#FFFFF8",
                      }}
                    />
                  ) : (
                    <pre style={{
                      padding: 20, margin: 0, whiteSpace: "pre-wrap", wordWrap: "break-word",
                      fontFamily: "'IBM Plex Mono', 'Consolas', monospace", fontSize: 12.5, lineHeight: 1.7, color: theme.text,
                    }}>
                      {currentNote.content}
                    </pre>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Comments Panel */}
          {showComments && (
            <div style={{ width: 320, minWidth: 320, borderLeft: `1px solid ${theme.border}`, background: "#FFF", display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${theme.border}`, fontWeight: 700, fontSize: 13, color: theme.text }}>
                💬 Comments — {currentNote?.title}
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: 12 }}>
                {noteComments.length === 0 && (
                  <div style={{ color: theme.textLight, fontSize: 12, textAlign: "center", padding: 20 }}>
                    No comments on this note yet.
                  </div>
                )}
                {noteComments.map((c, i) => (
                  <div key={i} style={{ background: theme.warningLight, borderLeft: `3px solid ${theme.warning}`, borderRadius: "0 4px 4px 0", padding: "8px 10px", marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 11, fontWeight: 600, color: theme.warning }}>{c.author}</span>
                      <button onClick={() => handleDeleteComment(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "#CCC", fontSize: 14, padding: 0, lineHeight: 1 }}>×</button>
                    </div>
                    <div style={{ fontSize: 12, color: theme.text, marginTop: 4, lineHeight: 1.4 }}>{c.text}</div>
                    <div style={{ fontSize: 10, color: theme.textLight, marginTop: 4 }}>{c.time}</div>
                  </div>
                ))}
              </div>
              <div style={{ padding: 12, borderTop: `1px solid ${theme.border}` }}>
                <textarea
                  value={newComment}
                  onChange={(e) => setNewComment(e.target.value)}
                  placeholder="Add a comment..."
                  onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAddComment(); }}}
                  style={{ width: "100%", padding: 8, border: `1px solid ${theme.border}`, borderRadius: 4, fontSize: 12, resize: "none", height: 60, outline: "none", fontFamily: "inherit" }}
                />
                <button
                  onClick={handleAddComment}
                  disabled={!newComment.trim()}
                  style={{
                    width: "100%", marginTop: 6, padding: "7px 0", background: newComment.trim() ? theme.primary : "#E0E0E0",
                    color: "#FFF", border: "none", borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: newComment.trim() ? "pointer" : "default",
                  }}
                >
                  Add Comment
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<EHRApp />);
  </script>
</body>
</html>
